# render.yaml — Render Blueprint Specification
#
# Este archivo define de forma declarativa la infraestructura en Render
# para desplegar el backend de nuestra aplicación Express + Prisma.
#
# Para usarlo:
#   1. Sube tu código a GitHub.
#   2. En Render Dashboard, haz clic en "New" -> "Blueprint".
#   3. Selecciona tu repositorio y Render configurará todo automáticamente.

services:
  - type: web
    name: pc2-pfdc3-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: LOG_LEVEL
        value: info
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: DATABASE_URL
        sync: false # Se debe configurar en la interfaz de Render (URL de conexión de Supabase)
      - key: FRONTEND_URL
        sync: false # Se debe configurar en la interfaz de Render (URL de Vercel)
      - key: JWT_SECRET
        generateValue: true # Genera un secret seguro aleatorio automáticamente
      - key: JWT_REFRESH_SECRET
        generateValue: true # Genera un secret de refresh seguro aleatorio automáticamente
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "30d"
